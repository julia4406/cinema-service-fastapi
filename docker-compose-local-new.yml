version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: DockerfileNew
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app

  celery:
    build:
      context: .
      dockerfile: DockerfileNew
    command: ["celery", "-A", "src.celery_app", "worker", "--loglevel=info", "-P", "solo"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PYTHONPATH=/app/src
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file: .env
    volumes:
      - .:/app

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: movies_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: some_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d movies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
