repos:
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        exclude: '(\.venv|venv|__pycache__|\.git|\.mypy_cache|\.tox)/'
        additional_dependencies:
          - flake8==7.1.1
        args:
          - --ignore=E203,E266,W503,F821,F811,ANN002,ANN003,ANN101,ANN102,ANN401,N807,N818,VNE001,F401,W504
          - --max-line-length=119
          - --max-complexity=18
          - --select=B,C,E,F,W,T4,B9,ANN,Q0,N8,VNE
          - --exclude=.venv
          - --extend-exclude=src/tests/*,src/database/migrations/*
